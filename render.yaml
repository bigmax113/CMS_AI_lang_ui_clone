services:
  - type: web
    name: cms-ai
    env: docker
    plan: free
    region: oregon
    healthCheckPath: /ai
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cms-ai-postgres
          property: connectionString
      - key: POSTGRES_URL
        fromDatabase:
          name: cms-ai-postgres
          property: connectionString
      - key: PAYLOAD_SECRET
        generateValue: true
      - key: PAYLOAD_ADMIN_EMAIL
        value: dev@payloadcms.com
      - key: PAYLOAD_ADMIN_PASSWORD
        sync: false
      - key: PAYLOAD_DB_PUSH
        value: 'true'
      - key: PAYLOAD_DB_SCHEMA
        value: cms_ai
      - key: AI_DOCS_DIR
        value: /app/docs
      - key: PAYLOAD_UPLOAD_DIR
        value: /app/media
      - key: MEDIA_DB_IMAGE_MAX_BYTES
        value: '3000000'
      - key: GOOGLE_DRIVE_STORAGE_ENABLED
        value: 'true'
      - key: GOOGLE_DRIVE_FOLDER_ID
        value: 1WGbLfKoL8bYEi6fIXI2ktBPZmwAe86Pj
      - key: GOOGLE_DRIVE_OAUTH_CLIENT_JSON_B64
        sync: false
      - key: GOOGLE_DRIVE_OAUTH_TOKEN_JSON_B64
        sync: false
      - key: GOOGLE_DRIVE_PUBLIC_READ
        value: 'true'
      - key: MEDIA_EXTERNAL_STORAGE_REQUIRED
        value: 'true'
      - key: XAI_API_KEY
        sync: false
      - key: XAI_BASE_URL
        value: https://api.x.ai/v1
      - key: GROK_TEXT_MODEL
        value: grok-4.3
      - key: GROK_IMAGE_MODEL
        value: grok-imagine-image
      - key: GROK_VIDEO_MODEL
        value: grok-imagine-video
      - key: GROK_VIDEO_POLL_ATTEMPTS
        value: '12'
      - key: GROK_VIDEO_POLL_INTERVAL_MS
        value: '5000'

databases:
  - name: cms-ai-postgres
    databaseName: payload
    user: payload
    plan: free
